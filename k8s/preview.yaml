---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hs-preview
  namespace: hiredsignal
  labels:
    app: hs-preview
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hs-preview
  template:
    metadata:
      labels:
        app: hs-preview
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /index.html
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /index.html
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: html
          configMap:
            name: hs-preview-html
            items:
              - key: index.html
                path: index.html
---
apiVersion: v1
kind: Service
metadata:
  name: hs-preview
  namespace: hiredsignal
  labels:
    app: hs-preview
spec:
  type: ClusterIP
  selector:
    app: hs-preview
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hs-preview
  namespace: hiredsignal
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: preview.hiredsignal.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hs-preview
                port:
                  number: 80
  tls:
    - hosts:
        - preview.hiredsignal.com
      secretName: hs-preview-tls
